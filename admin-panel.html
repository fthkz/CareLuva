<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareLuva Admin Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #3b82f6;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .status.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        .status.loading {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
        }
        .data-section {
            margin-bottom: 30px;
        }
        .data-section h3 {
            color: #1f2937;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .registration-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .registration-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .clinic-name {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .status-badge.pending {
            background: #fef3c7;
            color: #92400e;
        }
        .status-badge.approved {
            background: #d1fae5;
            color: #065f46;
        }
        .status-badge.rejected {
            background: #fee2e2;
            color: #991b1b;
        }
        .registration-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            font-size: 14px;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        .detail-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 4px;
        }
        .detail-value {
            color: #6b7280;
        }
        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-success:hover {
            background: #059669;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        .btn-secondary:hover {
            background: #4b5563;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        .error {
            color: #ef4444;
            background: #fee2e2;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }
            
            .container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .actions {
                flex-direction: column;
                gap: 8px;
            }
            
            .btn {
                width: 100%;
                padding: 12px;
                font-size: 14px;
                min-height: 44px; /* Touch-friendly */
            }
            
            .registration-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .registration-details {
                grid-template-columns: 1fr;
            }
            
            .detail-item {
                margin-bottom: 10px;
            }
            
            /* Ensure buttons are touch-friendly */
            button, .btn, a.btn {
                min-height: 44px;
                min-width: 44px;
                padding: 12px 16px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.25rem;
            }
            
            .registration-card {
                padding: 15px;
            }
            
            .clinic-name {
                font-size: 16px;
            }
        }
    </style>
</head>
<body data-admin-nav-active="dashboard">
    <script src="admin-nav.js"></script>
    <div class="container" id="main-content" style="display: none;">
        <div class="header" id="login-header">
            <h1>CareLuva Admin Panel</h1>
            <p>Secure admin access - authentication required</p>
        </div>

        <div id="login-section" style="display: none;">
            <div class="status loading">
                Admin authentication required
            </div>
            
            <form id="admin-login-form" style="max-width: 400px; margin: 0 auto;">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500; color: #374151;">Admin Email</label>
                    <input type="email" id="admin-email" required style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500; color: #374151;">Password</label>
                    <input type="password" id="admin-password" required style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px;">
                </div>
                <button type="submit" id="admin-login-btn" class="btn btn-primary" style="width: 100%;">Login as Admin</button>
            </form>
            
            <div style="margin-top: 15px; text-align: center;">
                <button type="button" id="test-login-btn" class="btn btn-secondary" style="width: 100%; margin-bottom: 10px;">Test Login (Debug)</button>
            </div>
            
            <div id="login-status" style="margin-top: 15px; padding: 10px; border-radius: 6px; display: none;"></div>
        </div>

        <div id="auth-checking" style="text-align: center; padding: 40px; display: block;">
            <div class="status loading">
                🔄 Checking authentication...
            </div>
        </div>

        <div id="admin-dashboard" style="display: none;">
            <div class="page-title-row" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem;">
                <div>
                    <h1 style="font-size:1.5rem;font-weight:700;color:#1f2937;"><i class="fas fa-gauge-high"></i> Admin Dashboard</h1>
                    <p style="color:#6b7280;font-size:.875rem;margin-top:.25rem;">Signed in as <span id="admin-name"></span></p>
                </div>
            </div>

            <div id="status" class="status loading">
                🔄 Connecting to Firebase...
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="loadRegistrations()">Refresh Data</button>
                <button class="btn btn-primary" onclick="loadReviews()">Review Moderation</button>
                <button class="btn btn-primary" onclick="window.location.href='admin-service-catalog.html'">Service Catalog</button>
                <button class="btn btn-primary" onclick="window.location.href='admin-payment-verification.html'">Payment Verification</button>
                <button class="btn btn-primary" onclick="window.location.href='admin-communication-monitor.html'">Communication Monitoring</button>
                <button class="btn btn-primary" onclick="window.location.href='admin-verification-workflow.html'">Clinic Verification</button>
                <button class="btn btn-secondary" onclick="showPasswordResetHelper()">Password Reset</button>
                <button class="btn btn-secondary" onclick="testConnection()">Test Connection</button>
                <button class="btn btn-secondary" onclick="window.open('https://console.firebase.google.com', '_blank')">Firebase Console</button>
            </div>

            <div id="data-container">
                <div class="loading">
                    <p>Loading registration data...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Review Moderation Script -->
    <script src="admin-review-moderation.js"></script>
    <!-- Clinic Verification System -->
    <script src="clinic-verification-system.js"></script>

    <!-- Firebase Configuration -->
    <script type="module">
        // Import Firebase configuration from external file
        import firebaseConfig from './firebase-config.js';

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, where, doc, updateDoc, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const { getAuth, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js');
            const auth = getAuth(app);
            window.firebase = { app, db, auth };
            window.firebaseReady = true;
            
            // Dispatch event for other scripts
            window.dispatchEvent(new Event('firebaseReady'));
            
            const statusEl = document.getElementById('status');
            if (statusEl) {
                statusEl.innerHTML = '✅ Firebase connected successfully!';
                statusEl.className = 'status success';
            }
            
            console.log('Firebase initialized successfully');
            
            // Check for existing authentication
            checkExistingAuth();
            
        } catch (error) {
            console.error('Firebase initialization failed:', error);
            const statusEl = document.getElementById('status');
            if (statusEl) {
                statusEl.innerHTML = `Firebase connection failed: ${error.message}`;
                statusEl.className = 'status error';
            }
        }
        
        // Check if user is already authenticated
        async function checkExistingAuth() {
            const authCheckingEl = document.getElementById('auth-checking');
            const loginSection = document.getElementById('login-section');
            const adminDashboard = document.getElementById('admin-dashboard');
            const mainContent = document.getElementById('main-content');
            
            // Show main content (it was hidden initially)
            if (mainContent) {
                mainContent.style.display = 'block';
            }
            
            try {
                if (!window.firebase || !window.firebase.auth) {
                    // Firebase not ready yet, show login
                    if (authCheckingEl) authCheckingEl.style.display = 'none';
                    if (loginSection) loginSection.style.display = 'block';
                    if (mainContent) mainContent.style.display = 'block';
                    return;
                }
                
                const { onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js');
                const { doc, getDoc } = await import('https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js');
                
                const auth = window.firebase.auth;
                
                // Wait for auth state to be determined (with timeout)
                const user = await Promise.race([
                    new Promise((resolve) => {
                        const unsubscribe = onAuthStateChanged(auth, (user) => {
                            unsubscribe();
                            resolve(user);
                        });
                    }),
                    new Promise((resolve) => setTimeout(() => resolve(null), 2000)) // 2 second timeout
                ]);
                
                // Hide checking message
                if (authCheckingEl) authCheckingEl.style.display = 'none';
                
                // Ensure main content is visible
                if (mainContent) {
                    mainContent.style.display = 'block';
                }
                
                if (user) {
                    console.log('✅ User already authenticated:', user.email);
                    
                    // Check if user has admin role
                    const userDoc = await getDoc(doc(window.firebase.db, 'admins', user.uid));
                    if (userDoc.exists()) {
                        const adminData = userDoc.data();
                        currentAdmin = adminData;
                        
                        // Show admin dashboard
                        if (loginSection) loginSection.style.display = 'none';
                        if (adminDashboard) adminDashboard.style.display = 'block';
                        if (mainContent) mainContent.style.display = 'block';
                        
                        const adminNameEl = document.getElementById('admin-name');
                        if (adminNameEl) {
                            adminNameEl.textContent = adminData.name || adminData.email;
                        }
                        
                        const statusEl = document.getElementById('status');
                        if (statusEl) {
                            statusEl.innerHTML = '✅ Authenticated as admin';
                            statusEl.className = 'status success';
                        }
                        
                        // Load data
                        if (typeof loadRegistrations === 'function') {
                            loadRegistrations();
                        }
                        
                        console.log('✅ Auto-logged in as admin');
                    } else {
                        console.log('❌ User is not an admin');
                        // Show login
                        if (loginSection) loginSection.style.display = 'block';
                        if (mainContent) mainContent.style.display = 'block';
                    }
                } else {
                    console.log('ℹ️ No existing authentication found');
                    // Show login
                    if (loginSection) loginSection.style.display = 'block';
                    if (mainContent) mainContent.style.display = 'block';
                }
            } catch (error) {
                console.error('Error checking existing auth:', error);
                // Show login on error
                if (authCheckingEl) authCheckingEl.style.display = 'none';
                if (loginSection) loginSection.style.display = 'block';
                if (mainContent) mainContent.style.display = 'block';
            }
        }

        async function loadRegistrations() {
            const statusEl = document.getElementById('status');
            const containerEl = document.getElementById('data-container');
            
            try {
                statusEl.innerHTML = 'Loading registrations...';
                statusEl.className = 'status loading';
                
                if (!window.firebase || !window.firebase.db || !window.firebaseReady) {
                    throw new Error('Firebase not initialized');
                }

                const q = query(collection(window.firebase.db, 'providerRegistrations'), orderBy('submittedAt', 'desc'));
                const querySnapshot = await getDocs(q);
                const registrations = querySnapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                console.log('Loaded registrations:', registrations);

                if (registrations.length === 0) {
                    containerEl.innerHTML = `
                        <div class="data-section">
                            <h3>Provider Registrations</h3>
                            <div class="registration-card">
                                <p style="text-align: center; color: #6b7280; padding: 20px;">
                                    No registrations found in Firebase database.
                                </p>
                            </div>
                        </div>
                    `;
                } else {
                    containerEl.innerHTML = `
                        <div class="data-section">
                            <h3>Provider Registrations (${registrations.length} found)</h3>
                            ${registrations.map(reg => `
                                <div class="registration-card">
                                    <div class="registration-header">
                                        <div class="clinic-name">${reg.clinicName || 'Unnamed Clinic'}</div>
                                        <div class="status-badge ${reg.status || 'pending'}">${reg.status || 'pending'}</div>
                                    </div>
                                    <div class="registration-details">
                                        <div class="detail-item">
                                            <div class="detail-label">Provider Type</div>
                                            <div class="detail-value">${reg.providerType || 'N/A'}</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">Contact Person</div>
                                            <div class="detail-value">${reg.contactPerson || 'N/A'}</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">Email</div>
                                            <div class="detail-value">${reg.email || 'N/A'}</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">Phone</div>
                                            <div class="detail-value">${reg.phone || 'N/A'}</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">Specialization</div>
                                            <div class="detail-value">${reg.specialization || 'N/A'}</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">Experience</div>
                                            <div class="detail-value">${reg.experienceYears ? (typeof reg.experienceYears === 'string' ? reg.experienceYears : String(reg.experienceYears)) + ' years' : '0 years'}</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">City</div>
                                            <div class="detail-value">${reg.city || 'N/A'}</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">Registration Date</div>
                                            <div class="detail-value">${reg.registrationDate ? new Date(reg.registrationDate.seconds * 1000).toLocaleString() : reg.submittedAt ? new Date(reg.submittedAt).toLocaleString() : 'N/A'}</div>
                                        </div>
                                    </div>
                                    
                                    <!-- Verification Criteria Section -->
                                    <div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #e5e7eb;">
                                        <h4 style="margin-bottom: 15px; color: #1f2937; font-size: 16px;">Verification Criteria</h4>
                                        
                                        <!-- Certifications -->
                                        <div style="margin-bottom: 15px; padding: 12px; background: #f9fafb; border-radius: 8px; border-left: 3px solid ${reg.certifications && reg.certifications.length > 0 ? '#10b981' : '#ef4444'};">
                                            <div style="font-weight: 600; margin-bottom: 8px; color: #374151;">
                                                Certifications ${reg.certifications && reg.certifications.length > 0 ? '<span style="color: #10b981;">Verified</span>' : '<span style="color: #ef4444;">Missing</span>'}
                                            </div>
                                            ${reg.certifications && Array.isArray(reg.certifications) && reg.certifications.length > 0 ? `
                                                <ul style="margin: 8px 0 0 20px; padding: 0; list-style: disc;">
                                                    ${reg.certifications.map(cert => `
                                                        <li style="margin-bottom: 4px; color: #6b7280; font-size: 14px;">
                                                            <strong>${cert.name || 'Unnamed'}</strong>
                                                            ${cert.number ? ` (${cert.number})` : ''}
                                                            ${cert.issueDate ? ` - Issued: ${new Date(cert.issueDate).toLocaleDateString()}` : ''}
                                                        </li>
                                                    `).join('')}
                                                </ul>
                                            ` : '<div style="color: #9ca3af; font-size: 14px;">No certifications provided</div>'}
                                        </div>
                                        
                                        <!-- Malpractice Insurance -->
                                        <div style="margin-bottom: 15px; padding: 12px; background: #f9fafb; border-radius: 8px; border-left: 3px solid ${reg.insuranceProvider && reg.insurancePolicyNumber ? '#10b981' : '#ef4444'};">
                                            <div style="font-weight: 600; margin-bottom: 8px; color: #374151;">
                                                Malpractice Insurance ${reg.insuranceProvider && reg.insurancePolicyNumber ? '<span style="color: #10b981;">Verified</span>' : '<span style="color: #ef4444;">Missing</span>'}
                                            </div>
                                            ${reg.insuranceProvider ? `
                                                <div style="font-size: 14px; color: #6b7280;">
                                                    <div><strong>Provider:</strong> ${reg.insuranceProvider}</div>
                                                    <div><strong>Policy #:</strong> ${reg.insurancePolicyNumber || 'N/A'}</div>
                                                    ${reg.insuranceStartDate && reg.insuranceEndDate ? `
                                                        <div><strong>Coverage:</strong> ${new Date(reg.insuranceStartDate).toLocaleDateString()} - ${new Date(reg.insuranceEndDate).toLocaleDateString()}</div>
                                                        ${new Date(reg.insuranceEndDate) >= new Date() ? '<span style="color: #10b981;">Valid</span>' : '<span style="color: #ef4444;">Expired</span>'}
                                                    ` : ''}
                                                    ${reg.documents && reg.documents.insurance ? `
                                                        <div style="margin-top: 8px;">
                                                            <a href="${reg.documents.insurance.url}" target="_blank" style="color: #3b82f6; text-decoration: none; font-size: 13px;">
                                                                View Insurance Certificate
                                                            </a>
                                                        </div>
                                                    ` : '<div style="color: #9ca3af; font-size: 13px; margin-top: 4px;">Certificate not uploaded</div>'}
                                                </div>
                                            ` : '<div style="color: #9ca3af; font-size: 14px;">No insurance information provided</div>'}
                                        </div>
                                        
                                        <!-- Experience Validation -->
                                        ${(() => {
                                            const expYears = reg.experienceYears;
                                            const expStr = expYears ? String(expYears) : '';
                                            const meetsRequirement = expStr === '3-5' || expStr === '6-10' || expStr === '11-15' || expStr === '16-20' || expStr === '20+' || (typeof expYears === 'number' && expYears >= 3);
                                            return `
                                                <div style="margin-bottom: 15px; padding: 12px; background: #f9fafb; border-radius: 8px; border-left: 3px solid ${meetsRequirement ? '#10b981' : '#ef4444'};">
                                                    <div style="font-weight: 600; margin-bottom: 8px; color: #374151;">
                                                        Experience Requirement ${meetsRequirement ? '<span style="color: #10b981;">Verified</span>' : '<span style="color: #ef4444;">Not Met</span>'}
                                                    </div>
                                                    <div style="font-size: 14px; color: #6b7280;">
                                                        <div><strong>Years of Experience:</strong> ${expYears || 'Not provided'}</div>
                                                        <div style="margin-top: 4px; font-size: 13px; color: ${meetsRequirement ? '#10b981' : '#ef4444'};">
                                                            ${meetsRequirement ? 'Meets minimum 3 years requirement' : 'Does not meet minimum 3 years requirement'}
                                                        </div>
                                                    </div>
                                                </div>
                                            `;
                                        })()}
                                        
                                        <!-- Documents -->
                                        <div style="margin-bottom: 15px; padding: 12px; background: #f9fafb; border-radius: 8px; border-left: 3px solid ${reg.documents && (reg.documents.license || reg.documents.insurance) ? '#10b981' : '#f59e0b'};">
                                            <div style="font-weight: 600; margin-bottom: 8px; color: #374151;">
                                                Documents ${reg.documents && (reg.documents.license || reg.documents.insurance) ? '<span style="color: #10b981;">Uploaded</span>' : '<span style="color: #f59e0b;">Pending</span>'}
                                            </div>
                                            <div style="font-size: 14px; color: #6b7280;">
                                                ${reg.documents ? `
                                                    <div style="display: flex; flex-direction: column; gap: 6px;">
                                                        ${reg.documents.license ? `
                                                            <div>
                                                                <a href="${reg.documents.license.url}" target="_blank" style="color: #3b82f6; text-decoration: none;">
                                                                    Medical License Document
                                                                </a>
                                                                <span style="color: #10b981; margin-left: 8px;">Uploaded</span>
                                                            </div>
                                                        ` : '<div style="color: #ef4444;">Medical License: Not uploaded</div>'}
                                                        ${reg.documents.insurance ? `
                                                            <div>
                                                                <a href="${reg.documents.insurance.url}" target="_blank" style="color: #3b82f6; text-decoration: none;">
                                                                    Insurance Certificate
                                                                </a>
                                                                <span style="color: #10b981; margin-left: 8px;">Uploaded</span>
                                                            </div>
                                                        ` : '<div style="color: #ef4444;">Insurance Certificate: Not uploaded</div>'}
                                                        ${reg.documents.businessLicense ? `
                                                            <div>
                                                                <a href="${reg.documents.businessLicense.url}" target="_blank" style="color: #3b82f6; text-decoration: none;">
                                                                    Business License (Optional)
                                                                </a>
                                                                <span style="color: #10b981; margin-left: 8px;">Uploaded</span>
                                                            </div>
                                                        ` : ''}
                                                        ${reg.documents.medicalDocuments && reg.documents.medicalDocuments.length > 0 ? `
                                                            <div>
                                                                <span style="color: #6b7280;">Additional Medical Documents (${reg.documents.medicalDocuments.length})</span>
                                                                ${reg.documents.medicalDocuments.map((doc, idx) => `
                                                                    <div style="margin-left: 20px; margin-top: 4px;">
                                                                        <a href="${doc.url}" target="_blank" style="color: #3b82f6; text-decoration: none; font-size: 13px;">
                                                                            Document ${idx + 1}
                                                                        </a>
                                                                    </div>
                                                                `).join('')}
                                                            </div>
                                                        ` : ''}
                                                    </div>
                                                ` : '<div style="color: #9ca3af;">No documents uploaded</div>'}
                                            </div>
                                        </div>
                                        
                                        <!-- Verification Summary -->
                                        ${(() => {
                                            const expYears = reg.experienceYears;

                if (!window.firebaseReady) {

                    await new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => {
                            reject(new Error('Firebase initialization timeout. Please refresh the page.'));
                        }, 10000); // 10 second timeout
                        
                        window.addEventListener('firebaseReady', () => {
                            clearTimeout(timeout);
                            resolve();
                        }, { once: true });
                        
                        // Also check if it becomes ready before event fires
                        const checkInterval = setInterval(() => {
                            if (window.firebaseReady) {
                                clearTimeout(timeout);
                                clearInterval(checkInterval);
                                resolve();
                            }
                        }, 100);
                    });
                }
                
                if (!window.firebase || !window.firebase.db) {
                    throw new Error('Firebase not initialized. Please refresh the page.');
                }

                modal.style.display = 'flex';
                modal.innerHTML = `
                    <div class="modal-content" style="max-width: 600px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h2 style="margin: 0;">Badge Status Check</h2>
                            <button onclick="this.closest('.modal').remove()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
                        </div>
                        
                        <div style="background: #f9fafb; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                            <h3 style="margin: 0 0 10px 0; color: #1f2937;">${reg.clinicName || 'Clinic'}</h3>
                        </div>
                        
                        <div style="display: grid; gap: 10px; margin-bottom: 20px;">
                            <div style="padding: 12px; background: ${badges.certified ? '#d1fae5' : '#fee2e2'}; border-radius: 8px; border-left: 4px solid ${badges.certified ? '#10b981' : '#ef4444'};">
                                <div style="font-weight: 600; margin-bottom: 5px;">
                                    Certified Badge
                                </div>
                                <div style="font-size: 0.875rem; color: #6b7280;">
                                    ${badges.certified ? 'Active' : 'Inactive - Missing certifications'}
                                </div>
                            </div>
                            
                            <div style="padding: 12px; background: ${badges.insured ? '#d1fae5' : '#fee2e2'}; border-radius: 8px; border-left: 4px solid ${badges.insured ? '#10b981' : '#ef4444'};">
                                <div style="font-weight: 600; margin-bottom: 5px;">
                                    Insured Badge
                                </div>
                                <div style="font-size: 0.875rem; color: #6b7280;">
                                    ${badges.insured ? 
                                        `Active - Valid until ${reg.insuranceEndDate ? new Date(reg.insuranceEndDate).toLocaleDateString() : 'N/A'}` : 
                                        'Inactive - Insurance expired or missing'
                                    }
                                </div>
                            </div>
                            
                            <div style="padding: 12px; background: ${badges.experienced ? '#d1fae5' : '#fee2e2'}; border-radius: 8px; border-left: 4px solid ${badges.experienced ? '#10b981' : '#ef4444'};">
                                <div style="font-weight: 600; margin-bottom: 5px;">
                                    Experienced Badge
                                </div>
                                <div style="font-size: 0.875rem; color: #6b7280;">
                                    ${badges.experienced ? 'Active' : 'Inactive - Does not meet requirement'}
                                </div>
                            </div>
                            
                            <div style="padding: 12px; background: ${badges.verified ? '#d1fae5' : '#fee2e2'}; border-radius: 8px; border-left: 4px solid ${badges.verified ? '#10b981' : '#ef4444'};">
                                <div style="font-weight: 600; margin-bottom: 5px;">
                                    Verified Badge
                                </div>
                                <div style="font-size: 0.875rem; color: #6b7280;">
                                    ${badges.verified ? 'Active - Fully verified' : 'Inactive - Not all criteria met'}
                                </div>
                            </div>
                        </div>
                        
                        ${issues.length > 0 ? `
                            <div style="padding: 12px; background: #fef3c7; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #f59e0b;">
                                <div style="font-weight: 600; margin-bottom: 8px; color: #92400e;">Issues Found</div>
                                <ul style="margin: 0; padding-left: 20px; color: #78350f; font-size: 0.875rem;">
                                    ${issues.map(issue => `<li>${issue}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}
                        
                        <div style="display: flex; gap: 10px; justify-content: flex-end;">
                            <button class="btn btn-primary" onclick="this.closest('.modal').remove()">Close</button>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
            } catch (error) {
                console.error('Error checking badge status:', error);
                alert('Error checking badge status: ' + error.message);
            }
        }
        
        // Make functions globally accessible
        window.openVerificationWorkflow = openVerificationWorkflow;
        window.checkBadgeStatus = checkBadgeStatus;
        window.completeVerification = completeVerification;

        // Secure updateStatus function
        async function updateStatus(registrationId, newStatus) {
            try {
                if (!currentAdmin) {
                    alert('Authentication required: Please log in to update registration status.');
                    return;
                }
                
                console.log(`🔐 Admin ${currentAdmin.email} updating registration ${registrationId} to status: ${newStatus}`);
                
                if (!window.firebase || !window.firebase.db || !window.firebaseReady) {
                    alert('Firebase not available for status update');
                    return;
                }
                
                const { doc, updateDoc, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js');
                
                const registrationRef = doc(window.firebase.db, 'providerRegistrations', registrationId);
                await updateDoc(registrationRef, {
                    status: newStatus,
                    lastUpdated: serverTimestamp(),
                    statusUpdatedBy: currentAdmin.email,
                    statusUpdatedByUid: currentAdmin.uid,
                    statusUpdatedAt: new Date().toISOString()
                });
                
                console.log(`Registration ${registrationId} updated to ${newStatus} by ${currentAdmin.email}`);
                
                // Update badges if clinic is approved
                if (newStatus === 'approved' && window.ClinicVerificationSystem) {
                    try {
                        const verificationSystem = new ClinicVerificationSystem();
                        verificationSystem.initialize(window.firebase.db);
                        await verificationSystem.updateClinicBadges(registrationId);
                        console.log('Badges updated for approved clinic');
                    } catch (badgeError) {
                        console.warn('Error updating badges:', badgeError);
                        // Continue even if badge update fails
                    }
                }
                
                // Show success message
                const statusMessages = {
                    'approved': 'Registration approved successfully! Badges updated.',
                    'rejected': 'Registration rejected.',
                    'pending': 'Registration status reset to pending.'
                };
                
                alert(statusMessages[newStatus] || 'Status updated successfully!');
                
                // Reload registrations
                loadRegistrations();
                
            } catch (error) {
                console.error('Error updating registration status:', error);
                alert(`Failed to update status: ${error.message}`);
            }
        }

        // Password Reset Helper for Admins
        async function showPasswordResetHelper() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 600px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="margin: 0;">🔑 Password Reset Helper</h2>
                        <button onclick="this.closest('.modal').remove()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
                    </div>
                    <div id="password-reset-helper-content">
                        <div style="text-align: center; padding: 40px;">
                            <div class="spinner"></div>
                            <p>Loading provider data...</p>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            try {
                await loadPasswordResetData(modal);
            } catch (error) {
                console.error('Error loading password reset data:', error);
                document.getElementById('password-reset-helper-content').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #ef4444;">
                        <p>Error loading data: ${error.message}</p>
                        <button onclick="showPasswordResetHelper()" class="btn btn-primary" style="margin-top: 15px;">Retry</button>
                    </div>
                `;
            }
        }
        
        async function loadPasswordResetData(modal) {
            const contentEl = document.getElementById('password-reset-helper-content');
            
            try {
                if (!window.firebase || !window.firebase.db || !window.firebaseReady) {
                    throw new Error('Firebase not initialized');
                }
                
                const { collection, query, orderBy, getDocs } = await import('https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js');
                
                // Load all registrations
                const registrationsRef = collection(window.firebase.db, 'providerRegistrations');
                let registrations = [];
                try {
                    const q = query(registrationsRef, orderBy('submittedAt', 'desc'));
                    const snapshot = await getDocs(q);
                    registrations = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                } catch (error) {
                    console.warn('Could not order, loading all:', error);
                    const snapshot = await getDocs(registrationsRef);
                    registrations = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                }
                
                if (registrations.length === 0) {
                    contentEl.innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <p>No provider registrations found.</p>
                        </div>
                    `;
                    return;
                }
                
                contentEl.innerHTML = `
                    <div style="margin-bottom: 20px;">
                        <p style="color: #6b7280; font-size: 14px; margin-bottom: 15px;">
                            <strong>Instructions:</strong> Find the provider below and use the email to reset their password via Firebase Console or the reset button.
                        </p>
                        <div style="background: #fef3c7; border: 1px solid #fbbf24; border-radius: 8px; padding: 15px; margin-bottom: 15px;">
                            <p style="margin: 0; color: #92400e; font-size: 14px;">
                                <strong>💡 Tip:</strong> Click "Open Firebase Console" to reset passwords directly, or copy the email and use the password reset feature in provider-auth.html
                            </p>
                        </div>
                    </div>
                    <div style="max-height: 400px; overflow-y: auto;">
                        ${registrations.map(reg => `
                            <div style="background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; margin-bottom: 10px;">
                                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px;">
                                    <div>
                                        <h4 style="margin: 0 0 5px 0;">${reg.clinicName || 'Unnamed Clinic'}</h4>
                                        <p style="margin: 0; color: #6b7280; font-size: 14px;">
                                            <strong>Email:</strong> ${reg.email || 'N/A'}
                                        </p>
                                        ${reg.contactPerson ? `<p style="margin: 5px 0 0 0; color: #6b7280; font-size: 14px;"><strong>Contact:</strong> ${reg.contactPerson}</p>` : ''}
                                    </div>
                                    <span style="background: ${reg.status === 'approved' ? '#d1fae5' : reg.status === 'rejected' ? '#fee2e2' : '#fef3c7'}; color: ${reg.status === 'approved' ? '#065f46' : reg.status === 'rejected' ? '#991b1b' : '#92400e'}; padding: 4px 12px; border-radius: 12px; font-size: 12px; text-transform: capitalize;">
                                        ${reg.status || 'pending'}
                                    </span>
                                </div>
                                <div style="display: flex; gap: 10px; margin-top: 10px;">
                                    <button onclick="
                                        window.open('https://console.firebase.google.com/project/careluva-5635e/authentication/users', '_blank');
                                        alert('Opened Firebase Console. Search for: ${reg.email}');
                                    " class="btn btn-primary" style="flex: 1; font-size: 12px; padding: 8px;">
                                        🔥 Open Firebase Console
                                    </button>
                                    <button onclick="
                                        navigator.clipboard.writeText('${reg.email}');
                                        alert('Email copied: ${reg.email}');
                                    " class="btn btn-secondary" style="flex: 1; font-size: 12px; padding: 8px;">
                                        📋 Copy Email
                                    </button>
                                </div>
                                <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #e5e7eb;">
                                    <p style="margin: 0; font-size: 12px; color: #6b7280;">
                                        <strong>Registration ID:</strong> ${reg.id}
                                    </p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div style="margin-top: 20px; padding: 15px; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px;">
                        <p style="margin: 0; color: #0369a1; font-size: 14px;">
                            <strong>How to Reset Password:</strong><br>
                            1. Click "Open Firebase Console" for the provider<br>
                            2. Search for their email in Authentication → Users<br>
                            3. Click on the user → Click "Reset Password"<br>
                            4. Or copy the email and use it in provider-auth.html "Forgot Password?"
                        </p>
                    </div>
                `;
            } catch (error) {
                throw error;
            }
        }

        // Make functions globally available (needed for onclick handlers in HTML)
        window.handleAdminLogin = handleAdminLogin;
        window.logout = logout;
        window.loadRegistrations = loadRegistrations;
        window.testConnection = testConnection;
        window.updateStatus = updateStatus;
        window.showPasswordResetHelper = showPasswordResetHelper;

        // Handle hash-based nav deep links (e.g. admin-panel.html#reviews, #password-reset).
        // The admin-nav promotes these into the active state; here we trigger the
        // corresponding action once the dashboard has finished initializing.
        function handleAdminHashAction() {
            var hash = (window.location.hash || '').replace(/^#/, '').toLowerCase();
            if (!hash) return;
            var dashboard = document.getElementById('admin-dashboard');
            if (!dashboard || dashboard.style.display === 'none') {
                // Dashboard not visible yet (auth pending). Try again shortly.
                setTimeout(handleAdminHashAction, 300);
                return;
            }
            if (hash === 'reviews' && typeof window.loadReviews === 'function') {
                window.loadReviews();
            } else if (hash === 'password-reset' && typeof window.showPasswordResetHelper === 'function') {
                window.showPasswordResetHelper();
            }
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function () { setTimeout(handleAdminHashAction, 300); });
        } else {
            setTimeout(handleAdminHashAction, 300);
        }
        window.addEventListener('hashchange', handleAdminHashAction);
    </script>
    <!-- Note: admin-panel.html has its own authentication flow (checkExistingAuth())
         so we don't need admin-auth-guard.js here. The guard is used for other admin pages. -->
    </div> <!-- Close main-content -->
</body>
</html>
